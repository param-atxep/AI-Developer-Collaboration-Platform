# =============================================================================
# Nginx Ingress Controller Configuration
# Routes: / -> frontend, /api/* -> api-gateway, /ws -> notification-service
# TLS with cert-manager
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foodrescue-ingress
  namespace: foodrescue
  labels:
    app.kubernetes.io/name: foodrescue-ingress
    app.kubernetes.io/part-of: food-waste-redistribution-platform
  annotations:
    # Ingress class
    kubernetes.io/ingress.class: nginx

    # cert-manager TLS automation
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/acme-challenge-type: http01

    # Nginx-specific configurations
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"

    # Security headers
    nginx.ingress.kubernetes.io/server-snippets: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Enable CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"

    # Gzip compression
    nginx.ingress.kubernetes.io/configuration-snippet: |
      gzip on;
      gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # SSL redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - foodrescue.example.com
        - api.foodrescue.example.com
      secretName: foodrescue-tls-secret
  rules:
    # ---------------------------------------------------------------
    # Main domain: frontend + API + WebSocket
    # ---------------------------------------------------------------
    - host: foodrescue.example.com
      http:
        paths:
          # API routes -> api-gateway
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

          # WebSocket routes -> notification-service
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8086

          # All other routes -> frontend (React SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

    # ---------------------------------------------------------------
    # API subdomain (optional): routes directly to API Gateway
    # ---------------------------------------------------------------
    - host: api.foodrescue.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
---
# =============================================================================
# WebSocket-specific Ingress (for proper upgrade handling)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foodrescue-ws-ingress
  namespace: foodrescue
  labels:
    app.kubernetes.io/name: foodrescue-ws-ingress
    app.kubernetes.io/part-of: food-waste-redistribution-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    # WebSocket support
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - foodrescue.example.com
      secretName: foodrescue-tls-secret
  rules:
    - host: foodrescue.example.com
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8086
