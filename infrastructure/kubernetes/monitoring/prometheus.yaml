# =============================================================================
# Prometheus - ConfigMap, Deployment, Service
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: foodrescue
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: food-waste-redistribution-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    # Alertmanager configuration (optional)
    # alerting:
    #   alertmanagers:
    #     - static_configs:
    #         - targets: ['alertmanager:9093']

    # Rule files (optional)
    # rule_files:
    #   - /etc/prometheus/rules/*.yml

    scrape_configs:
      # ---------------------------------------------------------------
      # Prometheus self-monitoring
      # ---------------------------------------------------------------
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
        metrics_path: /metrics

      # ---------------------------------------------------------------
      # Discovery Service
      # ---------------------------------------------------------------
      - job_name: 'discovery-service'
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        dns_sd_configs:
          - names:
              - 'discovery-service.foodrescue.svc.cluster.local'
            type: A
            port: 8761
        static_configs:
          - targets: ['discovery-service:8761']
            labels:
              service: 'discovery-service'

      # ---------------------------------------------------------------
      # API Gateway
      # ---------------------------------------------------------------
      - job_name: 'api-gateway'
        metrics_path: /actuator/prometheus
        scrape_interval: 10s
        dns_sd_configs:
          - names:
              - 'api-gateway.foodrescue.svc.cluster.local'
            type: A
            port: 8080
        static_configs:
          - targets: ['api-gateway:8080']
            labels:
              service: 'api-gateway'

      # ---------------------------------------------------------------
      # Auth Service
      # ---------------------------------------------------------------
      - job_name: 'auth-service'
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        dns_sd_configs:
          - names:
              - 'auth-service.foodrescue.svc.cluster.local'
            type: A
            port: 8081
        static_configs:
          - targets: ['auth-service:8081']
            labels:
              service: 'auth-service'

      # ---------------------------------------------------------------
      # User Service
      # ---------------------------------------------------------------
      - job_name: 'user-service'
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        dns_sd_configs:
          - names:
              - 'user-service.foodrescue.svc.cluster.local'
            type: A
            port: 8082
        static_configs:
          - targets: ['user-service:8082']
            labels:
              service: 'user-service'

      # ---------------------------------------------------------------
      # Food Listing Service
      # ---------------------------------------------------------------
      - job_name: 'food-listing-service'
        metrics_path: /actuator/prometheus
        scrape_interval: 10s
        dns_sd_configs:
          - names:
              - 'food-listing-service.foodrescue.svc.cluster.local'
            type: A
            port: 8083
        static_configs:
          - targets: ['food-listing-service:8083']
            labels:
              service: 'food-listing-service'

      # ---------------------------------------------------------------
      # Geolocation Service
      # ---------------------------------------------------------------
      - job_name: 'geolocation-service'
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        dns_sd_configs:
          - names:
              - 'geolocation-service.foodrescue.svc.cluster.local'
            type: A
            port: 8084
        static_configs:
          - targets: ['geolocation-service:8084']
            labels:
              service: 'geolocation-service'

      # ---------------------------------------------------------------
      # Pickup Service
      # ---------------------------------------------------------------
      - job_name: 'pickup-service'
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        dns_sd_configs:
          - names:
              - 'pickup-service.foodrescue.svc.cluster.local'
            type: A
            port: 8085
        static_configs:
          - targets: ['pickup-service:8085']
            labels:
              service: 'pickup-service'

      # ---------------------------------------------------------------
      # Notification Service
      # ---------------------------------------------------------------
      - job_name: 'notification-service'
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        dns_sd_configs:
          - names:
              - 'notification-service.foodrescue.svc.cluster.local'
            type: A
            port: 8086
        static_configs:
          - targets: ['notification-service:8086']
            labels:
              service: 'notification-service'

      # ---------------------------------------------------------------
      # Analytics Service
      # ---------------------------------------------------------------
      - job_name: 'analytics-service'
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        dns_sd_configs:
          - names:
              - 'analytics-service.foodrescue.svc.cluster.local'
            type: A
            port: 8087
        static_configs:
          - targets: ['analytics-service:8087']
            labels:
              service: 'analytics-service'

      # ---------------------------------------------------------------
      # AI Prediction Service
      # ---------------------------------------------------------------
      - job_name: 'ai-prediction-service'
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        dns_sd_configs:
          - names:
              - 'ai-prediction-service.foodrescue.svc.cluster.local'
            type: A
            port: 8088
        static_configs:
          - targets: ['ai-prediction-service:8088']
            labels:
              service: 'ai-prediction-service'

      # ---------------------------------------------------------------
      # Kubernetes Pod Discovery (auto-discover annotated pods)
      # ---------------------------------------------------------------
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - foodrescue
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: foodrescue
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: food-waste-redistribution-platform
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app: prometheus
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: foodrescue
  labels:
    app: prometheus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: foodrescue
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: food-waste-redistribution-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        runAsNonRoot: true
      serviceAccountName: default
      containers:
        - name: prometheus
          image: prom/prometheus:v2.50.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=30d"
            - "--storage.tsdb.retention.size=15GB"
            - "--web.enable-lifecycle"
            - "--web.enable-admin-api"
          ports:
            - containerPort: 9090
              name: http
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-data
---
# =============================================================================
# RBAC for Prometheus to discover Kubernetes resources
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: foodrescue
  labels:
    app: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: foodrescue-prometheus
  labels:
    app: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: foodrescue-prometheus
  labels:
    app: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: foodrescue-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: foodrescue
