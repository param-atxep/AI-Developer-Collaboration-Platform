      target: build
    ports:
      - "8086:8086"
      - "5012:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev,docker
      SPRING_DATASOURCE_PASSWORD: foodrescue_dev
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      SPRING_JPA_SHOW_SQL: "true"
      LOGGING_LEVEL_ROOT: DEBUG
    volumes:
      - ../../backend/notification-service/src:/app/src:ro
      - ../../backend/notification-service/pom.xml:/app/pom.xml:ro
      - maven-cache:/root/.m2

  # ============================================================
  # Analytics Service - Debug Mode
  # ============================================================
  analytics-service:
    build:
      context: ../../backend/analytics-service
      dockerfile: Dockerfile
      target: build
    ports:
      - "8087:8087"
      - "5013:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev,docker
      SPRING_DATASOURCE_PASSWORD: foodrescue_dev
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      SPRING_JPA_SHOW_SQL: "true"
      LOGGING_LEVEL_ROOT: DEBUG
    volumes:
      - ../../backend/analytics-service/src:/app/src:ro
      - ../../backend/analytics-service/pom.xml:/app/pom.xml:ro
      - maven-cache:/root/.m2

  # ============================================================
  # AI Prediction Service - Debug Mode
  # ============================================================
  ai-prediction-service:
    build:
      context: ../../backend/ai-prediction-service
      dockerfile: Dockerfile
      target: build
    ports:
      - "8088:8088"
      - "5014:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev,docker
      SPRING_DATASOURCE_PASSWORD: foodrescue_dev
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      SPRING_JPA_SHOW_SQL: "true"
      LOGGING_LEVEL_ROOT: DEBUG
    volumes:
      - ../../backend/ai-prediction-service/src:/app/src:ro
      - ../../backend/ai-prediction-service/pom.xml:/app/pom.xml:ro
      - maven-cache:/root/.m2

  # ============================================================
  # Frontend - Development with Hot Reload
  # ============================================================
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: build
    ports:
      - "3000:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080/ws
      NODE_ENV: development
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ../../frontend/src:/app/src:ro
      - ../../frontend/public:/app/public:ro
      - ../../frontend/index.html:/app/index.html:ro
      - ../../frontend/vite.config.ts:/app/vite.config.ts:ro
      - ../../frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ../../frontend/tsconfig.json:/app/tsconfig.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ============================================================
  # Monitoring - Dev Overrides
  # ============================================================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro


  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin

volumes:
  maven-cache:
    driver: local
