# docker-compose.dev.yml
# Development override - use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
version: "3.9"

services:
  # ============================================================
  # Infrastructure - Development Overrides
  # ============================================================

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: foodrescue_dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_dev --appendonly yes

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  # ============================================================
  # Discovery Service - Debug Mode
  # ============================================================
  discovery-service:
    build:
      context: ../../backend/discovery-service
      dockerfile: Dockerfile
      target: build
    ports:
      - "8761:8761"
      - "5005:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev,docker
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      LOGGING_LEVEL_ROOT: DEBUG
    volumes:
      - ../../backend/discovery-service/src:/app/src:ro
      - ../../backend/discovery-service/pom.xml:/app/pom.xml:ro
      - maven-cache:/root/.m2

  # ============================================================
  # API Gateway - Debug Mode
  # ============================================================
  api-gateway:
    build:
      context: ../../backend/api-gateway
      dockerfile: Dockerfile
      target: build
    ports:
      - "8080:8080"
      - "5006:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev,docker
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_GATEWAY: TRACE
    volumes:
      - ../../backend/api-gateway/src:/app/src:ro
      - ../../backend/api-gateway/pom.xml:/app/pom.xml:ro
      - maven-cache:/root/.m2

  # ============================================================
  # Auth Service - Debug Mode
  # ============================================================
  auth-service:
    build:
      context: ../../backend/auth-service
      dockerfile: Dockerfile
      target: build
    ports:
      - "8081:8081"
      - "5007:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev,docker
      SPRING_DATASOURCE_PASSWORD: foodrescue_dev
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      SPRING_JPA_SHOW_SQL: "true"
      LOGGING_LEVEL_ROOT: DEBUG
    volumes:
      - ../../backend/auth-service/src:/app/src:ro
      - ../../backend/auth-service/pom.xml:/app/pom.xml:ro
      - maven-cache:/root/.m2

  # ============================================================
  # User Service - Debug Mode
  # ============================================================
  user-service:
    build:
      context: ../../backend/user-service
      dockerfile: Dockerfile
      target: build
    ports:
      - "8082:8082"
      - "5008:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev,docker
      SPRING_DATASOURCE_PASSWORD: foodrescue_dev
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      SPRING_JPA_SHOW_SQL: "true"
      LOGGING_LEVEL_ROOT: DEBUG
    volumes:
      - ../../backend/user-service/src:/app/src:ro
      - ../../backend/user-service/pom.xml:/app/pom.xml:ro
      - maven-cache:/root/.m2

  # ============================================================
  # Food Listing Service - Debug Mode
  # ============================================================
  food-listing-service:
