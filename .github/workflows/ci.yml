# =============================================================================
# CI Pipeline - AI Food Waste Redistribution Platform
# Trigger: push to main, pull requests targeting main
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  AWS_REGION: "us-east-1"
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

permissions:
  contents: read
  packages: write
  id-token: write

# Cancel in-flight runs for the same branch / PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1 - Backend tests (matrix over all microservices)
  # ===========================================================================
  test-backend:
    name: "Test ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - food-listing-service
          - geolocation-service
          - pickup-service
          - notification-service
          - analytics-service
          - ai-prediction-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ matrix.service }}-${{ hashFiles('backend/${{ matrix.service }}/pom.xml') }}
          restore-keys: |
            maven-${{ matrix.service }}-
            maven-

      - name: Run tests for ${{ matrix.service }}
        working-directory: backend/${{ matrix.service }}
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
        run: |
          mvn clean verify -B \
            -Dspring.profiles.active=test \
            -Dmaven.test.failure.ignore=false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.service }}
          path: backend/${{ matrix.service }}/target/surefire-reports/
          retention-days: 14

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: backend/${{ matrix.service }}/target/site/jacoco/
          retention-days: 14

  # ===========================================================================
  # Job 2 - Frontend tests
  # ===========================================================================
  test-frontend:
    name: "Test Frontend"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            node-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm run test -- --ci --coverage

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ===========================================================================
  # Job 3 - Build & push Docker images (main branch only)
  # ===========================================================================
  build-images:
    name: "Build ${{ matrix.service }} image"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - food-listing-service
          - geolocation-service
          - pickup-service
          - notification-service
          - analytics-service
          - ai-prediction-service
          - frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker layer cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            docker-${{ matrix.service }}-

      - name: Determine build context
        id: context
        run: |
          if [ "${{ matrix.service }}" == "frontend" ]; then
            echo "path=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "path=backend/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.path }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/food-waste/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/food-waste/${{ matrix.service }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}

      # Rotate the cache so it does not grow unbounded
      - name: Rotate Docker layer cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ===========================================================================
  # Job 4 - Deploy to staging (main branch only)
  # ===========================================================================
  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.foodwaste.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for staging EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name food-waste-staging

      - name: Deploy to staging
        run: |
          SERVICES=(
            api-gateway
            auth-service
            user-service
            food-listing-service
            geolocation-service
            pickup-service
            notification-service
            analytics-service
            ai-prediction-service
            frontend
          )

          for svc in "${SERVICES[@]}"; do
            echo "--- Deploying ${svc} ---"
            kubectl set image deployment/${svc} \
              ${svc}=${{ env.ECR_REGISTRY }}/food-waste/${svc}:${{ github.sha }} \
              -n staging
          done

      - name: Wait for rollout
        run: |
          SERVICES=(
            api-gateway
            auth-service
            user-service
            food-listing-service
            geolocation-service
            pickup-service
            notification-service
            analytics-service
            ai-prediction-service
            frontend
          )

          for svc in "${SERVICES[@]}"; do
            echo "--- Waiting for ${svc} rollout ---"
            kubectl rollout status deployment/${svc} \
              -n staging --timeout=300s
          done

      - name: Run smoke tests
        run: |
          STAGING_URL="https://staging.foodwaste.example.com"

          echo "--- Health check ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/actuator/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status ${STATUS}"
            exit 1
          fi

          echo "--- API Gateway reachable ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/v1/health")
          if [ "$STATUS" != "200" ]; then
            echo "API Gateway health failed with status ${STATUS}"
            exit 1
          fi

          echo "All smoke tests passed."
