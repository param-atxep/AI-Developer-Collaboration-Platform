server:
  port: 8084

spring:
  application:
    name: geolocation-service

  datasource:
    url: jdbc:postgresql://localhost:5432/geolocation_db
    username: postgres
    password: Param2512
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: geolocation-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eureka:eureka_secret@localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:your-google-maps-api-key-here}

logging:
  level:
    com.foodrescue.geo: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: WARN
