worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # -------------------------------------------------------------------
    # Basic Settings
    # -------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;
    server_tokens off;

    # -------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # -------------------------------------------------------------------
    # Upstream Backends
    # -------------------------------------------------------------------
    upstream api_gateway {
        server api-gateway:8080;
        keepalive 32;
    }

    upstream notification_ws {
        server notification-service:8086;
        keepalive 32;
    }

    # -------------------------------------------------------------------
    # Server Block
    # -------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ---------------------------------------------------------------
        # Security Headers
        # ---------------------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss: http: https:; frame-ancestors 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---------------------------------------------------------------
        # API Proxy - Forward /api requests to API Gateway
        # ---------------------------------------------------------------
        location /api/ {
            proxy_pass http://api_gateway/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
        }

        # ---------------------------------------------------------------
        # WebSocket Proxy - Forward /ws to Notification Service
        # ---------------------------------------------------------------
        location /ws {
            proxy_pass http://notification_ws/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # ---------------------------------------------------------------
        # Static Asset Caching
        # ---------------------------------------------------------------
        location ~* \.(?:css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp|avif|woff|woff2|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # ---------------------------------------------------------------
        # React SPA - Serve index.html for all non-file routes
        # ---------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;

            # No cache for index.html to ensure fresh deployments
            location = /index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
                expires 0;
            }
        }

        # ---------------------------------------------------------------
        # Health Check Endpoint
        # ---------------------------------------------------------------
        location /health {
            access_log off;
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        # ---------------------------------------------------------------
        # Deny access to hidden files
        # ---------------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
