# ===========================================================================
# Logstash Pipeline - AI Food Waste Redistribution Platform
# Input:  Filebeat (Beats protocol on port 5044)
# Filter: Parse Spring Boot logs, extract JSON payloads, enrich
# Output: Elasticsearch (daily indices)
# ===========================================================================

input {
  beats {
    port => 5044
    ssl  => false
    type => "filebeat"
  }
}

filter {
  # -------------------------------------------------------------------
  # 1. Parse Kubernetes metadata from the container log path
  # -------------------------------------------------------------------
  if [kubernetes][container][name] {
    mutate {
      add_field => {
        "service_name" => "%{[kubernetes][container][name]}"
        "namespace"    => "%{[kubernetes][namespace]}"
        "pod_name"     => "%{[kubernetes][pod][name]}"
      }
    }
  }

  # -------------------------------------------------------------------
  # 2. Grok: parse standard Spring Boot / Logback log lines
  #    Format: 2024-01-15 10:23:45.123  INFO 1 --- [main] c.e.Class : Message
  # -------------------------------------------------------------------
  grok {
    match => {
      "message" => [
        "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{LOGLEVEL:log_level}\s+%{NUMBER:pid}\s+---\s+\[%{DATA:thread}\]\s+%{DATA:logger}\s+:\s+%{GREEDYDATA:log_message}",
        "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{LOGLEVEL:log_level}\s+%{NUMBER:pid}\s+---\s+\[%{DATA:thread}\]\s+%{GREEDYDATA:log_message}"
      ]
    }
    tag_on_failure => ["_grokparsefailure_springboot"]
  }

  # -------------------------------------------------------------------
  # 3. Try to parse the log_message body as JSON (structured logging)
  # -------------------------------------------------------------------
  if [log_message] {
    json {
      source       => "log_message"
      target       => "structured"
      skip_on_invalid_json => true
    }
  }

  # -------------------------------------------------------------------
  # 4. Parse the timestamp from the log line and use it as @timestamp
  # -------------------------------------------------------------------
  if [log_timestamp] {
    date {
      match   => ["log_timestamp", "yyyy-MM-dd HH:mm:ss.SSS", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "ISO8601"]
      target  => "@timestamp"
      timezone => "UTC"
    }
    mutate {
      remove_field => ["log_timestamp"]
    }
  }

  # -------------------------------------------------------------------
  # 5. Enrich: add environment and platform tags
  # -------------------------------------------------------------------
  mutate {
    add_field => {
      "platform"    => "food-waste-redistribution"
      "environment" => "%{[kubernetes][labels][environment]}"
    }
  }

  # Fall back to "unknown" when the label is absent
  if [environment] == "%{[kubernetes][labels][environment]}" {
    mutate {
      replace => { "environment" => "unknown" }
    }
  }

  # -------------------------------------------------------------------
  # 6. Extract trace / span IDs when present (Spring Cloud Sleuth / Micrometer Tracing)
  # -------------------------------------------------------------------
  if [log_message] =~ /traceId/ {
    grok {
      match => {
        "log_message" => "traceId[=:]%{DATA:trace_id}[,\s]"
      }
      tag_on_failure => []
    }
    grok {
      match => {
        "log_message" => "spanId[=:]%{DATA:span_id}[,\s]"
      }
      tag_on_failure => []
    }
  }

  # -------------------------------------------------------------------
  # 7. Categorise log levels for easier Kibana filtering
  # -------------------------------------------------------------------
  if [log_level] {
    mutate {
      uppercase => ["log_level"]
    }

    if [log_level] in ["ERROR", "FATAL"] {
      mutate { add_tag => ["error"] }
    } else if [log_level] == "WARN" {
      mutate { add_tag => ["warning"] }
    }
  }

  # -------------------------------------------------------------------
  # 8. Remove noisy / internal fields to reduce index size
  # -------------------------------------------------------------------
  mutate {
    remove_field => ["agent", "ecs", "input", "host.name", "log.offset"]
  }
}

output {
  # -------------------------------------------------------------------
  # Primary: Elasticsearch with daily indices per namespace
  # -------------------------------------------------------------------
  elasticsearch {
    hosts    => ["elasticsearch:9200"]
    index    => "food-waste-%{[namespace]}-%{+YYYY.MM.dd}"
    user     => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"

    # ILM (Index Lifecycle Management)
    ilm_enabled  => true
    ilm_rollover_alias => "food-waste-logs"
    ilm_pattern  => "000001"
    ilm_policy   => "food-waste-log-policy"

    # Template
    template_name    => "food-waste-logs"
    template_overwrite => true
  }

  # -------------------------------------------------------------------
  # Debug: uncomment to see events on stdout during development
  # -------------------------------------------------------------------
  # stdout {
  #   codec => rubydebug
  # }
}
